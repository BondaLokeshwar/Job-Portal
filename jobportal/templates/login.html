{% load static %}
<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body class="login-body">

<div class="form-container">

    <h2>Welcome Back</h2>

    {% if error %}
    <p style="color:red; text-align:center;">
        {{ error }}
    </p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <div class="options">

            <label>

                <input type="checkbox">

                Remember Me

            </label>

            <a href="#">
                Forgot Password?
            </a>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?

        <a href="{% url 'signup' %}">
            Register
        </a>
    </p>

</div>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
